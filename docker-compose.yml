version: "3.8"

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AI_SERVICE_URL=http://ai-brain:8000
    volumes:
      - backend-data:/app/data
      # ⚠️ สำหรับ WINDOWS: แก้ไขบรรทัดล่างให้เป็น Path ที่เก็บโปรเจกต์ของคุณ
      # เช่น - D:/work:/projects:ro (จะทำให้อ่านไฟล์ใน D:/work ผ่าน container path /projects ได้)
      - D:/work:/projects:ro
    depends_on:
      - ai-brain

  ai-brain:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - BACKEND_BASE_URL=http://backend:8080
      - GRAPH_DB_URL=bolt://neo4j:7687
      - GRAPH_DB_USER=neo4j
      - GRAPH_DB_PASSWORD=password
    volumes:
      - ai-data-chroma:/app/db/chroma
    # Need host.docker.internal to reach local Ollama on Windows/Mac
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  neo4j:
    image: neo4j:5.12-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_connector_bolt_advertised__address=localhost:7687
    volumes:
      - neo4j-data:/data

volumes:
  backend-data:
  ai-data-chroma:
  neo4j-data:
